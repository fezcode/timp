# Vertical Timp skin — portrait window, sliders run top-to-bottom, transport
# buttons stack in a single column, playlist docks at the bottom.
#
# A slider with h > w is rendered & dragged vertically (bottom = 0, top = max,
# physical-fader convention) — both the position and volume sliders use that.

[meta]
name = Vertical

[window]
width          = 220
height         = 540
compact_height = 540
modal_width    = 480
modal_height   = 380

[theme]
background = 14,18,24
panel      = 28,36,46
accent     = 80,255,130
text       = 200,220,230

# -- Title bar --------------------------------------------------------------
[drag]
rect = 0,0,168,14

[button.settings]
hit = 170,2,14,10
[button.min]
hit = 186,2,14,10
[button.close]
hit = 202,2,14,10

# -- Display column ---------------------------------------------------------
[display.title]
rect  = 6,18,208,11
color = 80,255,130

[display.time]
rect  = 6,32,208,12
color = 80,255,130

[viz]
rect  = 6,48,208,72
color = 80,255,130

# -- Vertical sliders flanking the button column ----------------------------
# Position runs along the left edge, volume along the right edge. Bottom = 0.
[slider.position]
rect  = 8,128,16,280
color = 80,255,130

[slider.volume]
rect  = 196,128,16,280
color = 80,255,130

# -- Transport buttons stacked between the sliders --------------------------
# 8 buttons × 32 tall + 3 px gap = 280 tall (matches the slider rail).
# Buttons are 44 wide (close to square) and centered in the column so the
# procedurally-drawn icons stay nicely proportioned instead of stretching out.
[button.prev]
hit = 88,128,44,32
[button.play]
hit = 88,163,44,32
[button.stop]
hit = 88,198,44,32
[button.next]
hit = 88,233,44,32
[button.open]
hit = 88,268,44,32
[button.eq]
hit = 88,303,44,32
[button.shuffle]
hit = 88,338,44,32
[button.loop]
hit = 88,373,44,32

# -- Playlist panel at the bottom -------------------------------------------
[playlist]
rect      = 6,418,208,116
color     = 80,255,130
header_h  = 12
row_h     = 11

# -- File browser modal -----------------------------------------------------
[filebrowser]
header_h = 22
footer_h = 22
row_h    = 14

# -- Settings modal ---------------------------------------------------------
[settings]
header_h = 16
tab_h    = 18
footer_h = 22
row_h    = 16

# -- Equalizer panel --------------------------------------------------------
[eq]
slider_top    = 34
slider_bottom = 148
slider_w      = 8
track_w       = 4
title_y       = 20
label_y       = 154
readout_y     = 164
