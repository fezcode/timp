# WHamp skin format. Pixel coordinates relative to window top-left.
#
# Sections:
#   [meta]              name = ...
#   [window]            width, height, background = path/to/file.png  (optional)
#   [theme]             background, panel, accent, text  (R,G,B 0-255 — comma-separated)
#   [drag]              rect = X,Y,W,H            (region the OS treats as the title bar)
#   [button.{prev|play|pause|stop|next|open|shuffle|loop|min|close}]
#                       hit     = X,Y,W,H
#                       normal  = X,Y,W,H        (only used if a background image is set)
#                       pressed = X,Y,W,H
#   [display.title]     rect = X,Y,W,H   color = R,G,B
#   [display.time]      rect = X,Y,W,H   color = R,G,B
#   [viz]               rect = X,Y,W,H   color = R,G,B
#   [slider.position]   rect = X,Y,W,H   color = R,G,B
#   [slider.volume]     rect = X,Y,W,H   color = R,G,B

[meta]
name = Default

[window]
width = 380
height = 110

[theme]
background = 14,18,24
panel      = 28,36,46
accent     = 80,255,130
text       = 200,220,230

[drag]
rect = 0,0,348,14

