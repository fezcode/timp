# =============================================================================
#  Timp skin format
# =============================================================================
# All coordinates are in unscaled pixels relative to the window's top-left.
# Rect format is "X,Y,W,H". Color format is "R,G,B" with components 0..255.
# Anything not set falls back to a sensible built-in default — start small and
# only override what you want to customise.
#
# Section reference (skip down for the actual values):
#
#   [meta]               name = "Display Name"
#
#   [window]             width, height                — main window (with playlist)
#                        compact_height               — height when playlist hidden
#                        modal_width, modal_height    — file dialog / settings size
#                        background = path/to/bg.png  — optional full-window image
#
#   [theme]              background, panel, accent, text   — R,G,B colors
#
#   [font]               (optional sprite-sheet font)
#                        sheet      = font.png        — path under skin folder
#                        cell_w, cell_h               — glyph cell pixel size
#                        cols, rows                   — sheet grid dimensions
#                        first_char                   — ASCII of cell (0,0), e.g. 32 = space
#                        gap_x                        — pixel spacing between glyphs
#                        draw_w, draw_h               — render size (defaults to cell size)
#
#   [drag]               rect = X,Y,W,H               — region the OS treats as a title bar
#
#   [buttons]            sheet = path/to/buttons.png  — shared sprite sheet for transport buttons
#
#   [button.{prev|play|pause|stop|next|open|eq|shuffle|loop|settings|min|close}]
#                        hit     = X,Y,W,H            — clickable region in window
#                        normal  = X,Y,W,H            — sprite source rect (uses [buttons] sheet)
#                        pressed = X,Y,W,H            — pressed-state sprite (optional)
#                        hover   = X,Y,W,H            — hover-state sprite   (optional)
#                        sheet   = path.png           — per-button override sheet (optional)
#
#   [display.title]      rect, color                  — currently-playing title text
#   [display.time]       rect, color                  — MM:SS / MM:SS readout
#
#   [viz]                rect, color                  — waveform / spectrum panel
#
#   [slider.position]    rect, color                  — playback position bar
#   [slider.volume]      rect, color                  — volume bar
#
#   [playlist]           rect, color
#                        header_h   = N               — height of the "PLAYLIST [n]" header
#                        row_h      = N               — height of each playlist row
#
#   [filebrowser]        header_h, footer_h, row_h    — modal layout
#                        open_btn   = X,Y,W,H         — explicit OPEN button rect
#                        cancel_btn = X,Y,W,H         — explicit CANCEL button rect
#
#   [settings]           header_h, tab_h, footer_h, row_h
#                        close_btn  = X,Y,W,H
#
#   [eq]                 slider_top, slider_bottom    — vertical extent of the 10 sliders
#                        slider_w, track_w            — slider hit width / track render width
#                        title_y                      — y of "EQUALIZER" label
#                        label_y                      — y of "60 / 170 / ..." freq labels
#                        readout_y                    — y of dB readouts
#                        onoff_btn  = X,Y,W,H         — ON/OFF toggle (header, optional)
#                        flat_btn   = X,Y,W,H         — FLAT button   (header, optional)
#                        back_btn   = X,Y,W,H         — BACK button   (header, optional)
#
# =============================================================================

[meta]
name = Default

[window]
width          = 300
height         = 188
compact_height = 88
modal_width    = 520
modal_height   = 380

[theme]
background = 14,18,24
panel      = 28,36,46
accent     = 80,255,130
text       = 200,220,230

# -- Title bar --------------------------------------------------------------
[drag]
rect = 0,0,252,14

[button.settings]
hit = 252,2,14,10
[button.min]
hit = 268,2,14,10
[button.close]
hit = 284,2,14,10

# -- Display row ------------------------------------------------------------
[display.title]
rect  = 6,16,288,9
color = 80,255,130

[display.time]
rect  = 6,28,68,11
color = 80,255,130

[viz]
rect  = 78,28,216,11
color = 80,255,130

# -- Sliders ----------------------------------------------------------------
[slider.position]
rect  = 6,42,288,6
color = 80,255,130

[slider.volume]
rect  = 6,52,160,6
color = 80,255,130

# -- Transport row ----------------------------------------------------------
# A single play/pause button: icon switches with audio state, click toggles.
[button.prev]
hit = 6,62,28,22
[button.play]
hit = 36,62,28,22
[button.stop]
hit = 66,62,28,22
[button.next]
hit = 96,62,28,22
[button.open]
hit = 126,62,28,22
[button.eq]
hit = 206,62,28,22
[button.shuffle]
hit = 236,62,28,22
[button.loop]
hit = 266,62,28,22

# -- Playlist panel ---------------------------------------------------------
[playlist]
rect      = 6,90,288,92
color     = 80,255,130
header_h  = 12
row_h     = 11

# -- File browser modal -----------------------------------------------------
[filebrowser]
header_h = 22
footer_h = 22
row_h    = 14
# open_btn / cancel_btn left unset → derived from modal_width

# -- Settings modal ---------------------------------------------------------
[settings]
header_h = 16
tab_h    = 18
footer_h = 22
row_h    = 16

# -- Equalizer panel --------------------------------------------------------
[eq]
slider_top    = 34
slider_bottom = 148
slider_w      = 8
track_w       = 4
title_y       = 20
label_y       = 154
readout_y     = 164
# Header buttons left unset → anchored to right edge of window automatically.
