# Pip-Boy — Fallout 3000 phosphor-green CRT vibe.
#
# bg.png is a fully-decorated CRT screen: ROBCO/PIPBOY header strip,
# STAT/INV/DATA/MAP/RADIO mode tabs (RADIO highlighted), TRACKLIST.LST divider
# above the playlist, and an HP/AP/RAD/VAULT-101 status bar at the bottom.
# Real controls dock into the empty zones between those baked-in chrome bands.
#
# compact_height == height locks the window to one size so toggling the
# playlist doesn't squash the bg decorations — playlist hides in place.

[meta]
name = Pip-Boy

[window]
width          = 480
height         = 420
compact_height = 420
modal_width    = 520
modal_height   = 380
background     = bg.png

[theme]
background = 4,14,6
panel      = 14,40,18
accent     = 102,235,108
text       = 150,220,150

# -- Title bar (drag area sits behind the ROBCO header text in bg) ----------
[drag]
rect = 0,0,432,16

[button.settings]
hit = 432,3,14,11
[button.min]
hit = 450,3,14,11
[button.close]
hit = 466,3,12,11

# -- Display row (below the mode-tab strip in bg, y=44..76) -----------------
[display.title]
rect  = 10,46,460,11
color = 102,235,108

[display.time]
rect  = 10,60,90,12
color = 102,235,108

[viz]
rect  = 104,60,368,12
color = 102,235,108

# -- Sliders (y=80..100) ----------------------------------------------------
[slider.position]
rect  = 10,80,460,8
color = 102,235,108

[slider.volume]
rect  = 10,92,200,8
color = 102,235,108

# -- Transport row (y=108..148) ---------------------------------------------
[button.prev]
hit = 10,108,40,40
[button.play]
hit = 54,108,40,40
[button.stop]
hit = 98,108,40,40
[button.next]
hit = 142,108,40,40
[button.open]
hit = 186,108,40,40

[button.eq]
hit = 342,108,40,40
[button.shuffle]
hit = 386,108,40,40
[button.loop]
hit = 430,108,40,40

# -- Playlist panel (sits a few px below the bg's TRACKLIST divider so its
# own "PLAYLIST [N]" header doesn't collide with the bg's "[ NOW PLAYING ]"
# badge) ---------------------------------------------------------------------
[playlist]
rect      = 10,180,460,210
color     = 102,235,108
header_h  = 14
row_h     = 12

# -- File browser modal -----------------------------------------------------
[filebrowser]
header_h = 22
footer_h = 22
row_h    = 14

# -- Settings modal ---------------------------------------------------------
[settings]
header_h = 16
tab_h    = 18
footer_h = 22
row_h    = 16

# -- Equalizer panel --------------------------------------------------------
[eq]
slider_top    = 60
slider_bottom = 220
slider_w      = 12
track_w       = 4
title_y       = 44
label_y       = 226
readout_y     = 240
