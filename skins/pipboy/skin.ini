# Pip-Boy — Fallout 3000 phosphor-green CRT vibe.
# bg.png is a pre-rendered scanline + corner-bracket vignette so the window
# always reads as a CRT no matter how the playlist toggle resizes it.

[meta]
name = Pip-Boy

[window]
width          = 380
height         = 360
compact_height = 116
modal_width    = 520
modal_height   = 380
background     = bg.png

[theme]
# Deep CRT black with a green-ish bias so dimmed elements don't go grey.
background = 4,14,6
panel      = 14,40,18
# Phosphor green for highlights, slightly desaturated green for body text.
accent     = 102,235,108
text       = 150,220,150

# -- Title bar --------------------------------------------------------------
[drag]
rect = 0,0,332,16

[button.settings]
hit = 332,3,14,11
[button.min]
hit = 350,3,14,11
[button.close]
hit = 366,3,12,11

# -- Display row ------------------------------------------------------------
[display.title]
rect  = 10,20,360,11
color = 102,235,108

[display.time]
rect  = 10,34,84,12
color = 102,235,108

[viz]
rect  = 100,34,272,12
color = 102,235,108

# -- Sliders (horizontal) ---------------------------------------------------
[slider.position]
rect  = 10,52,360,8
color = 102,235,108

[slider.volume]
rect  = 10,64,200,8
color = 102,235,108

# -- Transport buttons ------------------------------------------------------
# Chunky 36x32 buttons. 5 left (prev/play/stop/next/open) + 3 right (eq/shuffle/loop).
[button.prev]
hit = 10,78,36,32
[button.play]
hit = 50,78,36,32
[button.stop]
hit = 90,78,36,32
[button.next]
hit = 130,78,36,32
[button.open]
hit = 170,78,36,32

[button.eq]
hit = 254,78,36,32
[button.shuffle]
hit = 294,78,36,32
[button.loop]
hit = 334,78,36,32

# -- Playlist panel ---------------------------------------------------------
[playlist]
rect      = 10,118,360,234
color     = 102,235,108
header_h  = 13
row_h     = 12

# -- File browser modal -----------------------------------------------------
[filebrowser]
header_h = 22
footer_h = 22
row_h    = 14

# -- Settings modal ---------------------------------------------------------
[settings]
header_h = 16
tab_h    = 18
footer_h = 22
row_h    = 16

# -- Equalizer panel --------------------------------------------------------
[eq]
slider_top    = 38
slider_bottom = 168
slider_w      = 10
track_w       = 4
title_y       = 22
label_y       = 174
readout_y     = 186
